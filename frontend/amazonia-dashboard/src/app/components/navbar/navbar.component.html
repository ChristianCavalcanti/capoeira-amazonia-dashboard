<header class="navbar" role="banner">
  <div class="navbar-inner">
    <div class="header-left">
      <a href="#inicio" class="logo-area" (click)="scrollToSection('inicio'); $event.preventDefault()">
        <span class="logo-mark">
          <app-logo-capoeira [size]="72" variant="default" />
        </span>
        <span class="logo-text">
          <span class="logo-main">CAPOEIRA</span>
          <span class="logo-sub">
            Centro Avançado em Pesquisas Socioecológicas
            para a Recuperação Ambiental da Amazônia
          </span>
        </span>
      </a>
    </div>

    <nav class="header-center nav" [class.nav-open]="menuOpen" role="navigation" aria-label="Main navigation">
      <div class="nav-menu">
        @for (item of menuItems(); track item.id) {
          <button type="button" class="nav-link" (click)="scrollToSection(item.id)">
            {{ item.label }}
          </button>
        }
      </div>
      <a [href]="linkedInUrl" target="_blank" rel="noopener noreferrer" class="nav-icon-link" aria-label="Visit CAPOEIRA Center LinkedIn page">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
      <a href="https://padlet.com/denisevalerialima/pesquisadores-as-do-capoeira-i3iuotc9u60jb600" target="_blank" rel="noopener noreferrer" class="nav-link-external">
        Equipe
      </a>
    </nav>

    <div class="header-right">
      <button
        type="button"
        class="theme-toggle"
        [attr.aria-label]="darkModeLabel()"
        [attr.aria-pressed]="isDarkMode()"
        [title]="darkModeLabel()"
        (click)="toggleDarkMode()"
      >
        <span class="theme-toggle-icon theme-toggle-sun" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        </span>
        <span class="theme-toggle-icon theme-toggle-moon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </span>
      </button>
      <div class="lang-flags" role="group" aria-label="Select website language">
        <button
          type="button"
          class="lang-flag lang-flag-br"
          [class.lang-flag-active]="currentLanguage() === 'pt'"
          [attr.aria-current]="currentLanguage() === 'pt' ? 'true' : null"
          (click)="setLanguage('pt')"
          title="Português"
          aria-label="Change language to Portuguese"
        >
          <span class="lang-flag-svg" aria-hidden="true">
            <!-- Bandeira BR: verde, losango amarelo, círculo azul -->
            <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg">
              <rect width="60" height="40" fill="#009c3b"/>
              <path fill="#ffdf00" d="M30 2 L58 20 L30 38 L2 20 Z"/>
              <circle cx="30" cy="20" r="7" fill="#002776"/>
            </svg>
          </span>
          <span class="lang-flag-label">BR</span>
        </button>
        <button
          type="button"
          class="lang-flag lang-flag-us"
          [class.lang-flag-active]="currentLanguage() === 'en'"
          [attr.aria-current]="currentLanguage() === 'en' ? 'true' : null"
          (click)="setLanguage('en')"
          title="English"
          aria-label="Change language to English"
        >
          <span class="lang-flag-svg" aria-hidden="true">
            <!-- Bandeira US: listras e cantão -->
            <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg">
              <rect width="60" height="40" fill="#b22234"/>
              <path fill="#fff" d="M0 0h60v3.2H0V0zm0 6.4h60v3.2H0V6.4zm0 6.4h60v3.2H0v-3.2zm0 6.4h60v3.2H0v-3.2zm0 6.4h60v3.2H0v-3.2zm0 6.4h60v3.2H0v-3.2zm0 6.4h60V40H0v-3.2z"/>
              <rect width="24" height="16" fill="#3c3b6e"/>
              <g fill="#fff" transform="scale(0.35) translate(2,2)">
                <circle cx="6" cy="4" r="1.2"/><circle cx="18" cy="4" r="1.2"/><circle cx="30" cy="4" r="1.2"/><circle cx="42" cy="4" r="1.2"/>
                <circle cx="12" cy="10" r="1.2"/><circle cx="24" cy="10" r="1.2"/><circle cx="36" cy="10" r="1.2"/>
                <circle cx="6" cy="16" r="1.2"/><circle cx="18" cy="16" r="1.2"/><circle cx="30" cy="16" r="1.2"/><circle cx="42" cy="16" r="1.2"/>
                <circle cx="12" cy="22" r="1.2"/><circle cx="24" cy="22" r="1.2"/><circle cx="36" cy="22" r="1.2"/>
              </g>
            </svg>
          </span>
          <span class="lang-flag-label">ENG</span>
        </button>
      </div>
    </div>

    <button
      type="button"
      class="menu-toggle"
      [attr.aria-label]="menuOpen ? 'Close menu' : 'Open menu'"
      [attr.aria-expanded]="menuOpen"
      (click)="toggleMenu()"
    >
      <span class="menu-toggle-bar"></span>
      <span class="menu-toggle-bar"></span>
      <span class="menu-toggle-bar"></span>
    </button>
  </div>
</header>
