<div class="highlight-card" [attr.title]="tooltip() || null">
  <div class="highlight-card-icon" [attr.data-icon]="icon()">
    @switch (icon()) {
      @case ('area') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      }
      @case ('carbon') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg>
      }
      @case ('regions') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      }
      @case ('trend') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 6l-9.5 9.5-5-5L1 18"/></svg>
      }
      @case ('sites') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
      }
      @case ('institutions') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      }
    }
  </div>
  <p class="highlight-card-value">
    {{ value() }}
    @if (variation()) {
      <span class="highlight-card-variation" [class.positive]="variation().startsWith('+')" [class.negative]="variation().startsWith('-')">{{ variation() }}</span>
    }
  </p>
  <h3 class="highlight-card-title">{{ title() }}</h3>
  @if (subtitle()) {
    <p class="highlight-card-subtitle">{{ subtitle() }}</p>
  }
</div>
